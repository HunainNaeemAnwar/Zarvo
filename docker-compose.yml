version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: zarvo-db
    environment:
      POSTGRES_DB: zarvo
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: zarvo123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d zarvo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
